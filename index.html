<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Personal portfolio of Daniel Juranec, Software Engineer specializing in Java, Python, Databricks, and Spark.">
    <title>Daniel Juranec</title>
    <link rel="icon" type="image/ico" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Flag Icons for Windows compatibility -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.0/css/flag-icons.min.css">
</head>

<body class="light-theme">
    <!-- Custom Cursor -->
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <div class="background-animation"></div>

    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
        <i class="fas fa-moon"></i>
    </button>

    <main class="container">
        <div class="profile-card fade-in">
            <div class="profile-image-container">
                <img src="assets/profile.jpg" alt="Profile Picture" class="profile-img">
                <div class="status-indicator"></div>
            </div>

            <div class="profile-info">
                <h1 class="name">Daniel Juranec</h1>
                <h2 class="title">Software Engineer</h2>
                <p class="bio">I specialise in robust data pipelines and scalable backend systems.
                    Let's turn complex problems into elegant solutions.</p>
            </div>

            <!-- Skills Marquee -->
            <div class="skills-marquee">
                <div class="skills-track">
                    <span class="skill-java">Java</span><span class="skill-python">Python</span><span
                        class="skill-databricks">Databricks</span><span class="skill-spark">Spark</span>
                    <!-- Duplicate for infinite scroll effect -->
                    <span class="skill-java">Java</span><span class="skill-python">Python</span><span
                        class="skill-databricks">Databricks</span><span class="skill-spark">Spark</span>
                </div>
            </div>

            <div class="contact-links">
                <a href="https://linkedin.com/in/juranec" target="_blank" class="social-btn linkedin"
                    aria-label="LinkedIn profile">
                    <i class="fab fa-linkedin"></i>
                    <span>LinkedIn</span>
                </a>
                <a href="mailto:juranec@gmail.com" class="social-btn email" aria-label="Send email">
                    <i class="fas fa-envelope"></i>
                    <span>Email me</span>
                </a>
            </div>

            <!-- Time & Status Widget -->
            <div class="status-widget">
                <div class="status-item">
                    <span class="fi fi-gb"></span>
                    <span>Glasgow</span>
                </div>
                <span class="status-divider">•</span>
                <div class="status-item">
                    <i class="far fa-clock"></i>
                    <span id="local-time">--:--</span>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
